# Render Infrastructure Blueprint
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: playto-db
    databaseName: playto
    user: playto
    plan: free

services:
  # ── Managed Redis ──────────────────────────────────────────────────────────
  - type: redis
    name: playto-redis
    plan: free
    ipAllowList: []

  # ── Django API ─────────────────────────────────────────────────────────────
  - type: web
    name: playto-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      sh -c "python manage.py makemigrations merchants payouts &&
      python manage.py migrate &&
      python manage.py seed &&
      gunicorn playto.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /api/v1/merchants/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: playto.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,playto-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://playto-payout.vercel.app"
      - key: DB_HOST
        fromDatabase:
          name: playto-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: playto-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: playto-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: playto-db
          property: password
      - key: DB_PORT
        fromDatabase:
          name: playto-db
          property: port
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: playto-celery-worker
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A playto worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: playto.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: playto-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DB_HOST
        fromDatabase:
          name: playto-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: playto-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: playto-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: playto-db
          property: password
      - key: DB_PORT
        fromDatabase:
          name: playto-db
          property: port
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

  # ── Celery Beat ────────────────────────────────────────────────────────────
  - type: worker
    name: playto-celery-beat
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A playto beat --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: playto.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: playto-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DB_HOST
        fromDatabase:
          name: playto-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: playto-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: playto-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: playto-db
          property: password
      - key: DB_PORT
        fromDatabase:
          name: playto-db
          property: port
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString
